name: Deploy Arcade Portfolio

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/jahoodev/arcade-portfolio:${{ github.sha }} \
            -t ghcr.io/jahoodev/arcade-portfolio:latest .

      - name: Push image
        run: |
          docker push ghcr.io/jahoodev/arcade-portfolio:${{ github.sha }}
          docker push ghcr.io/jahoodev/arcade-portfolio:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /app/arcade-portfolio
            docker compose pull
            docker compose down
            docker compose up -d

            # basic health check (fail deploy if app is dead)
            sleep 3
            curl -f http://localhost:3000 || exit 1
